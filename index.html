  function saveInvoiceDraft() {
    const customerIdInput = document.getElementById("invoice-customer-id")?.value?.trim();
    const customerName = document.getElementById("invoice-customer-name")?.value?.trim();
    const customerPhone = document.getElementById("invoice-customer-phone")?.value?.trim() || "";
    const invoiceNumber = document.getElementById("invoice-number")?.value?.trim() || getNextInvoiceNumber();
    const dateValue = document.getElementById("invoice-date")?.value;
    const status = document.getElementById("invoice-status")?.value || "pending";
    const discount = parseNumber(document.getElementById("invoice-discount")?.value);
    const paidAmount = parseNumber(document.getElementById("invoice-paid")?.value);
    const note = document.getElementById("invoice-note")?.value?.trim() || "";

    if (!customerName) {
      showToast("يرجى إدخال اسم العميل", "error");
      return;
    }

    const rows = Array.from(document.querySelectorAll("#invoice-items-wrap > .grid"));
    const items = rows.map(row => {
      const name = row.querySelector(".invoice-item-name")?.value?.trim() || "";
      const qty = parseNumber(row.querySelector(".invoice-item-qty")?.value);
      const price = parseNumber(row.querySelector(".invoice-item-price")?.value);
      return {
        name,
        qty,
        price,
        total: qty * price
      };
    }).filter(i => i.name && i.qty > 0);

    if (!items.length) {
      showToast("أضف صنفًا واحدًا على الأقل", "error");
      return;
    }

    let customer = customerIdInput ? getCustomerById(customerIdInput) : null;
    if (!customer) {
      customer = (state.data.customers || []).find(c =>
        (c.name || "").trim() === customerName &&
        (customerPhone ? (c.phone || "").trim() === customerPhone : true)
      );
    }

    if (!customer) {
      customer = {
        id: uid("cust"),
        name: customerName,
        phone: customerPhone,
        address: "",
        notes: "",
        creditLimit: state.data.settings.defaultCreditLimit || 0,
        balance: 0,
        payments: [],
        manualDebts: [],
        createdAt: new Date().toISOString()
      };
      state.data.customers.push(customer);
    } else if (customerPhone && !customer.phone) {
      customer.phone = customerPhone;
    }

    const subtotal = items.reduce((a,b)=> a + Number(b.total || 0), 0);

    const invoice = {
      id: uid("inv"),
      invoiceNumber,
      customerId: customer.id,
      date: dateValue ? new Date(dateValue).toISOString() : new Date().toISOString(),
      items,
      subtotal,
      discount,
      paidAmount,
      note,
      status,
      createdAt: new Date().toISOString(),
      createdBy: state.session.userId
    };

    state.data.invoices.push(invoice);
    enqueueSyncOperation({ type: "add_invoice", payload: { invoiceId: invoice.id, invoiceNumber } });
    saveAppState();
    closeModal();
    render();
    showToast("تم حفظ الفاتورة", "success");
    if (!isLocalOnlyMode() && navigator.onLine) syncQueueToCloud();
  }

<script>
  async function exportReportsImage() {
    const area = document.getElementById("reports-export-area");
    if (!area) return;
    const canvas = await html2canvas(area, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true,
      allowTaint: false
    });
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "reports.png";
    link.click();
    showToast("تم حفظ التقرير كصورة", "success");
  }

  async function exportReportsPDF() {
    const area = document.getElementById("reports-export-area");
    if (!area) return;

    const canvas = await html2canvas(area, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true,
      allowTaint: false
    });

    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageHeight = 297;
    const imgWidth = 190;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 10;

    pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
    heightLeft -= (pageHeight - 20);

    while (heightLeft > 0) {
      position = heightLeft - imgHeight + 10;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - 20);
    }

    pdf.save("reports.pdf");
    showToast("تم حفظ التقرير PDF", "success");
  }

  function exportReportsExcel() {
    const data = getReportsData();

    const wb = XLSX.utils.book_new();

    const summaryRows = [
      ["اسم المحل", state.data.settings.shopName || state.data.settings.companyName || ""],
      ["إجمالي الفواتير", data.totalInvoices],
      ["إجمالي المبيعات", data.totalSales],
      ["إجمالي المدفوع", data.totalPaid],
      ["إجمالي الخصومات", data.totalDiscount],
      ["إجمالي الديون", data.totalRemaining],
      ["إجمالي المشتريات", data.totalPurchases]
    ];

    const customerRows = [
      ["الزبون", "عدد الفواتير", "الإجمالي", "المدفوع", "المتبقي"],
      ...data.customerRows.map(r => [r.customerName, r.invoiceCount, r.total, r.paid, r.remaining])
    ];

    const itemRows = [
      ["الصنف", "إجمالي الكمية", "عدد مرات الظهور", "إجمالي البيع"],
      ...data.itemRows.map(r => [r.itemName, r.qty, r.invoiceCount, r.sales])
    ];

    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryRows), "ملخص");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(customerRows), "بالزبون");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(itemRows), "بالصنف");

    XLSX.writeFile(wb, "reports.xlsx");
    showToast("تم حفظ التقرير Excel", "success");
  }

  function exportReportsWord() {
    const data = getReportsData();

    const html = `
      <html dir="rtl" lang="ar">
      <head><meta charset="utf-8"></head>
      <body>
        <h2>${escapeHtml(state.data.settings.shopName || state.data.settings.companyName || "")}</h2>
        <h3>ملخص المبيعات الكلي</h3>
        <p>إجمالي الفواتير: ${data.totalInvoices}</p>
        <p>إجمالي المبيعات: ${formatCurrency(data.totalSales)}</p>
        <p>إجمالي المدفوع: ${formatCurrency(data.totalPaid)}</p>
        <p>إجمالي الخصومات: ${formatCurrency(data.totalDiscount)}</p>
        <p>إجمالي الديون: ${formatCurrency(data.totalRemaining)}</p>

        <h3>تقرير تفصيلي بالزبون</h3>
        <table border="1" style="border-collapse:collapse;width:100%;text-align:right">
          <tr><th>الزبون</th><th>عدد الفواتير</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th></tr>
          ${data.customerRows.map(r => `
            <tr>
              <td>${escapeHtml(r.customerName)}</td>
              <td>${r.invoiceCount}</td>
              <td>${escapeHtml(formatCurrency(r.total))}</td>
              <td>${escapeHtml(formatCurrency(r.paid))}</td>
              <td>${escapeHtml(formatCurrency(r.remaining))}</td>
            </tr>
          `).join("")}
        </table>

        <h3>تقرير تفصيلي بالصنف</h3>
        <table border="1" style="border-collapse:collapse;width:100%;text-align:right">
          <tr><th>الصنف</th><th>إجمالي الكمية</th><th>عدد مرات الظهور</th><th>إجمالي البيع</th></tr>
          ${data.itemRows.map(r => `
            <tr>
              <td>${escapeHtml(r.itemName)}</td>
              <td>${r.qty}</td>
              <td>${r.invoiceCount}</td>
              <td>${escapeHtml(formatCurrency(r.sales))}</td>
            </tr>
          `).join("")}
        </table>
      </body>
      </html>
    `;

    const blob = new Blob(['\ufeff', html], { type: "application/msword;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "reports.doc";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);

  }
</script>

<script>
  function saveCachedLicense(license) {
    localStorage.setItem(LICENSE_CACHE_KEY, JSON.stringify(license));
  }

  function clearCachedLicense() {
    localStorage.removeItem(LICENSE_CACHE_KEY);
  }

  async function validateLicenseOnline(key, countLogin = true) {
    const trimmed = String(key || "").trim();
    if (!trimmed) return { ok: false, message: "يرجى إدخال المفتاح" };
    if (!navigator.onLine) return { ok: false, message: "يلزم توفر الإنترنت لأول مرة للتحقق من المفتاح" };

    await ensureFirebaseReady();
    const { ref, get, update } = window.feeFirebase;
    const installationId = generateInstallationId();

    try {
      const licenseRef = ref(firebaseDbRef, `${LICENSE_PATH}/${trimmed}`);
      const snapshot = await get(licenseRef);

      if (!snapshot.exists()) return { ok: false, message: "المفتاح غير صالح" };

      const remoteLicense = snapshot.val() || {};
      if (remoteLicense.status !== "active") return { ok: false, message: "هذا المفتاح معطل" };

      const isPermanent = !!remoteLicense.isPermanent;
      const expiresAt = isPermanent ? null : Number(remoteLicense.expiresAt || 0);
      const allowUnlimitedDevices = !!remoteLicense.allowUnlimitedDevices;
      const maxDevices = allowUnlimitedDevices ? null : Number(remoteLicense.maxDevices || 1);
      const loginCount = Number(remoteLicense.loginCount || 0);
      const syncMode = remoteLicense.syncMode || "online_sync";

      if (!isPermanent && expiresAt && Date.now() >= expiresAt) {
        return { ok: false, message: "المفتاح منتهي" };
      }

      if (countLogin && !allowUnlimitedDevices && loginCount >= maxDevices) {
        return { ok: false, message: "تم استهلاك عدد الأجهزة المسموح" };
      }

      if (countLogin) {
        const payload = {
          lastLoginAt: Date.now(),
          lastInstallationId: installationId
        };
        if (!allowUnlimitedDevices) payload.loginCount = loginCount + 1;
        await update(licenseRef, payload);
      }

      const customSnap = await get(ref(firebaseDbRef, getLicenseSettingsPath(trimmed)));
      const custom = customSnap.exists() ? (customSnap.val() || {}) : {};

      const licenseData = {
        key: trimmed,
        companyName: custom.companyName || remoteLicense.companyName || DEFAULT_SETTINGS.companyName,
        logo: remoteLicense.logo || "",
        planType: remoteLicense.planType || "regular",
        isPermanent,
        expiresAt,
        status: remoteLicense.status || "active",
        usersEnabled: !!remoteLicense.usersEnabled,
        allowUnlimitedDevices,
        maxDevices,
        syncMode,
        cachedAt: Date.now(),
        installationId
      };

      return { ok: true, license: licenseData };
    } catch (error) {
      console.error(error);
      return { ok: false, message: "تعذر التحقق من المفتاح" };
    }
  }

  function handleLicenseLoginClick() {
    handleLogin();
  }

  async function handleLogin() {
    clearLoginStatus(false);

    const key = document.getElementById("licenseKeyInput").value.trim();
    const btn = document.getElementById("loginBtn");

    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-spinner fa-spin ml-2"></i> جارٍ التحقق...`;

    try {
      const result = await validateLicenseOnline(key, true);
      if (!result.ok) {
        showLoginStatus(result.message || "تعذر تسجيل الدخول", "error", false);
        return;
      }

      saveCachedLicense(result.license);
      setForceLoginOnly(false);
      clearSessionState();
      resetStateForCurrentKey();

      state.data.settings.companyName = result.license.companyName || state.data.settings.companyName;
      state.data.settings.shopName = result.license.companyName || state.data.settings.shopName;
      if (result.license.logo) state.data.settings.logo = result.license.logo;

      state.session = getDefaultAdminSession();

      saveAppState();
      applyTheme();
      setShell("app");

      if (!isLocalOnlyMode()) {
        await pullFullStateFromCloud();
        await attachRealtimeSync();
      }

      updateConnectionUI();
      state.syncStatus = "idle";
      hideTopSync();
      render();
      showToast("تم تسجيل الدخول بنجاح", "success");
    } finally {
      btn.disabled = false;
      btn.textContent = "دخول";
    }
  }

  async function handleEmployeeLogin() {
    clearLoginStatus(true);

    const usernameInput = document.getElementById("employeeUsername");
    const passwordInput = document.getElementById("employeePassword");
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    const btn = document.getElementById("employeeLoginBtn");

    if (!username || !password) {
      showLoginStatus("يرجى إدخال اسم المستخدم وكلمة المرور", "error", true);
      return;
    }

    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-spinner fa-spin ml-2"></i> جارٍ الدخول...`;

    try {
      if (!navigator.onLine) {
        showLoginStatus("دخول الموظف المباشر يحتاج إنترنت", "error", true);
        return;
      }

      await ensureFirebaseReady();
      const { ref, get } = window.feeFirebase;

      const userSnap = await get(ref(firebaseDbRef, `fee_employee_accounts/${username}`));
      if (!userSnap.exists()) {
        passwordInput.value = "";
        showLoginStatus("اسم المستخدم أو كلمة المرور غير صحيحة", "error", true);
        return;
      }

      const remoteUser = userSnap.val() || {};
      if ((remoteUser.password || "") !== password) {
        passwordInput.value = "";
        showLoginStatus("اسم المستخدم أو كلمة المرور غير صحيحة", "error", true);
        return;
      }

      if (remoteUser.isActive === false) {
        passwordInput.value = "";
        showLoginStatus("هذا الحساب معطل", "error", true);
        return;
      }

      const companyKey = remoteUser.companyKey || remoteUser.licenseKey || "";
      if (!companyKey) {
        passwordInput.value = "";
        showLoginStatus("الحساب غير مربوط بشركة", "error", true);
        return;
      }

      const licenseResult = await validateLicenseOnline(companyKey, false);
      if (!licenseResult.ok) {
        passwordInput.value = "";
        showLoginStatus("تعذر تحميل بيانات الشركة لهذا الموظف", "error", true);
        return;
      }

      saveCachedLicense(licenseResult.license);
      setForceLoginOnly(false);
      resetStateForCurrentKey();

      state.data.settings.companyName = licenseResult.license.companyName || state.data.settings.companyName;
      state.data.settings.shopName = licenseResult.license.companyName || state.data.settings.shopName;
      if (licenseResult.license.logo) state.data.settings.logo = licenseResult.license.logo;

      if (!isLocalOnlyMode()) {
        await pullFullStateFromCloud();
        await attachRealtimeSync();
      }

      let localUser = (state.data.users || []).find(u => u.username === username);

      if (!localUser) {
        localUser = {
          id: remoteUser.id || uid("user"),
          name: remoteUser.name || username,
          username,
          password,
          role: remoteUser.role || "user",
          isActive: remoteUser.isActive !== false,
          permissions: { ...(remoteUser.permissions || EMPLOYEE_DEFAULT_PERMISSIONS) },
          createdAt: remoteUser.createdAt || new Date().toISOString()
        };
        state.data.users.push(localUser);
      } else {
        localUser.name = remoteUser.name || localUser.name || username;
        localUser.password = remoteUser.password || localUser.password || password;
        localUser.role = remoteUser.role || localUser.role || "user";
        localUser.isActive = remoteUser.isActive !== false;
        localUser.permissions = {
          ...(localUser.role === "admin" ? DEFAULT_USER_PERMISSIONS : EMPLOYEE_DEFAULT_PERMISSIONS),
          ...(remoteUser.permissions || localUser.permissions || {})
        };
      }

      state.session = normalizeSession({
        userId: localUser.id,
        displayName: localUser.name || localUser.username,
        role: localUser.role || "user",
        loginSource: "employee_direct",
        permissions: {
          ...(localUser.role === "admin" ? DEFAULT_USER_PERMISSIONS : EMPLOYEE_DEFAULT_PERMISSIONS),
          ...(localUser.permissions || {})
        }
      });

      try {
        localStorage.setItem(getEmployeeLastUsernameKey(), username);
      } catch {}

      saveAppState();
      applyTheme();
      setShell("app");
      updateConnectionUI();
      state.syncStatus = "idle";
      hideTopSync();
      render();
      showToast(`مرحبًا ${state.session.displayName}`, "success");
    } finally {
      btn.disabled = false;
      btn.textContent = "دخول موظف";
    }
  }

  function restoreSavedEmployeeUsername() {
    try {
      const saved = localStorage.getItem(getEmployeeLastUsernameKey()) || "";
      const input = document.getElementById("employeeUsername");
      if (input && saved) input.value = saved;
    } catch {}
  }

  function initLoginTabs() {
    document.getElementById("licenseTabBtn").addEventListener("click", () => setLoginMode("license"));
    document.getElementById("employeeTabBtn").addEventListener("click", () => {
      setLoginMode("employee");
      restoreSavedEmployeeUsername();
    });
  }

  function bootstrapLicenseFlow() {
    const cached = getCurrentLicense();

    if (shouldForceLoginOnly()) {
      clearSessionState();
      state.session = getEmptyLoggedOutSession();
      setShell("login");
      setLoginMode(localStorage.getItem(LOGIN_MODE_KEY) || "employee");
      restoreSavedEmployeeUsername();
      return;
    }

    if (!cached) {
      clearSessionState();
      state.session = getEmptyLoggedOutSession();
      setShell("login");
      setLoginMode(localStorage.getItem(LOGIN_MODE_KEY) || "license");
      restoreSavedEmployeeUsername();
      return;
    }

    if (isLicenseExpired(cached)) {
      clearSessionState();
      document.getElementById("expiredTitle").textContent = "انتهى الاشتراك";
      document.getElementById("expiredText").textContent = "انتهت صلاحية المفتاح. يرجى إدخال مفتاح صالح.";
      setShell("expired");
      return;
    }

    resetStateForCurrentKey();

    if (cached.companyName) {
      state.data.settings.companyName = cached.companyName;
      state.data.settings.shopName = cached.companyName;
    }
    if (cached.logo && !state.data.settings.logo) {
      state.data.settings.logo = cached.logo;
    }

    const restoredSession = loadSessionState();

    if (restoredSession.loginSource === "logged_out") {
      setShell("login");
      setLoginMode(localStorage.getItem(LOGIN_MODE_KEY) || "employee");
      restoreSavedEmployeeUsername();
      return;
    }

    state.session = normalizeSession(restoredSession);

    applyTheme();
    setShell("app");
    updateConnectionUI();
    hideTopSync();

    if (isLocalOnlyMode()) {
      render();
      return;
    }

    pullFullStateFromCloud().then(() => {
      attachRealtimeSync();
      render();
    });
  }

  function init() {
    initLoginTabs();

    document.getElementById("loginBtn").addEventListener("click", handleLicenseLoginClick);
    document.getElementById("employeeLoginBtn").addEventListener("click", handleEmployeeLogin);

    document.getElementById("licenseKeyInput").addEventListener("keydown", e => {
      if (e.key === "Enter") handleLicenseLoginClick();
    });

    document.getElementById("employeeUsername").addEventListener("keydown", e => {
      if (e.key === "Enter") handleEmployeeLogin();
    });

    document.getElementById("employeePassword").addEventListener("keydown", e => {
      if (e.key === "Enter") handleEmployeeLogin();
    });

    document.getElementById("goToLoginBtn").addEventListener("click", () => {
      clearSessionState();
      clearCachedLicense();
      detachRealtimeSync();
      setForceLoginOnly(false);
      state.session = getEmptyLoggedOutSession();
      setShell("login");
      setLoginMode("license");
    });

    window.addEventListener("online", async () => {
      updateConnectionUI();
      if (!isLocalOnlyMode()) {
        await syncQueueToCloud();
        await attachRealtimeSync();
      }
      render();
    });

    window.addEventListener("offline", () => {
      updateConnectionUI();
      hideTopSync();
      render();
    });

    window.onpopstate = function() {
      if (state.screenStack.length > 1) {
        state.screenStack.pop();
        state.currentScreen = state.screenStack[state.screenStack.length - 1];
        saveAppState();
        render();
      } else {
        history.pushState(null, null, window.location.pathname);
      }
    };

    history.pushState(null, null, window.location.pathname);
    bootstrapLicenseFlow();
    restoreSavedEmployeeUsername();
    updateAlertsBadge();
  }

  init();
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        await navigator.serviceWorker.register("./sw-fee.js");
      } catch (e) {
        console.error("SW registration failed", e);
      }
    });
  }
</script>
<script src="./cashier-patch.js"></script>
</body>
