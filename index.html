<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام إدارة المبيعات والعملاء</title>

  <link rel="manifest" href="./manifest-fee.json" />
  <meta name="theme-color" content="#2d59d8" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap');

    :root{
      --primary:#2d59d8;
      --primary-2:#3d69e6;
      --primary-3:#557ff0;
      --danger:#dc2626;
      --success:#16a34a;
      --warning:#d97706;
      --dark:#1f2a44;
      --muted:#6b7280;
      --bg:#f2f4f7;
      --card:#ffffff;
      --border:#e5e7eb;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --shadow-soft:0 8px 22px rgba(15,23,42,.06);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--dark);
      font-family: 'Cairo', sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body { padding-bottom: 92px; }

    .hidden-force { display:none !important; }

    .glass-header {
      background: #eef2f6;
      border-bottom: 1px solid #d9e0ea;
      box-shadow: 0 8px 20px rgba(15,23,42,.06);
    }

    .bottom-nav {
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid #e5e7eb;
      box-shadow: 0 -8px 24px rgba(15,23,42,.06);
    }

    .fancy-card {
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.85);
      box-shadow: var(--shadow-soft);
    }

    .section-card {
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
      border: 1px solid #e5e7eb;
      box-shadow: var(--shadow-soft);
      border-radius: 30px;
    }

    .btn {
      transition: .18s ease;
      transform: translateY(0);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(.985); }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #fff;
      outline: none;
      transition: .18s ease;
      font-size: 14px;
      color: var(--dark);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }

    .input, .select {
      padding: 12px 14px;
      min-height: 52px;
    }

    .textarea {
      padding: 12px 14px;
      min-height: 110px;
      resize: vertical;
    }

    .input:focus, .select:focus, .textarea:focus {
      border-color: var(--primary-3);
      box-shadow: 0 0 0 4px rgba(85,127,240,.18);
    }

    .badge {
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .badge-blue { background:rgba(59,130,246,.12); color:#1d4ed8; }
    .badge-red { background:rgba(239,68,68,.12); color:#dc2626; }
    .badge-green { background:rgba(34,197,94,.12); color:#15803d; }
    .badge-yellow { background:rgba(245,158,11,.12); color:#b45309; }
    .badge-slate { background:rgba(100,116,139,.12); color:#334155; }
    .badge-purple { background:rgba(139,92,246,.12); color:#6d28d9; }

    .top-sync-progress {
      position: sticky;
      top: 74px;
      z-index: 45;
      margin: 8px auto 0;
      width: min(980px, calc(100% - 24px));
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 20px;
      background: #eef5ff;
      border: 1px solid #cfe0ff;
      box-shadow: var(--shadow-soft);
    }

    .top-sync-progress.show { display: flex; }

    .sync-spinner {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 3px solid rgba(45,89,216,.16);
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
      flex-shrink: 0;
    }

    .sync-progress {
      flex: 1;
      height: 10px;
      background: #dbe7ff;
      border-radius: 999px;
      overflow: hidden;
    }

    .sync-progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg,var(--primary),var(--primary-2),var(--primary-3));
      transition: width .25s ease;
    }

    .sync-percent {
      min-width: 52px;
      text-align: left;
      font-weight: 900;
      color: var(--primary);
      font-size: 13px;
    }

    .sync-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--primary);
      white-space: nowrap;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.48);
      backdrop-filter: blur(6px);
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-panel {
      width: 100%;
      max-width: 920px;
      max-height: 90vh;
      overflow: auto;
      background: rgba(255,255,255,.99);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(15,23,42,.22);
    }

    .toast-wrap {
      position: fixed;
      top: 18px;
      left: 18px;
      right: 18px;
      z-index: 140;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      background: rgba(15,23,42,.94);
      color: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      box-shadow: 0 14px 40px rgba(2,6,23,.28);
    }
    .toast.success { background: rgba(22,163,74,.96); }
    .toast.error { background: rgba(220,38,38,.96); }
    .toast.warning { background: rgba(245,158,11,.98); color:#111827; }

    .login-shell {
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background: linear-gradient(180deg, #edf2f8 0%, #f7f9fc 100%);
    }

    .login-tab-btn{
      flex:1;
      min-height:50px;
      border-radius:18px;
      border:1px solid #dbe3ef;
      background:#fff;
      color:#334155;
      font-weight:900;
    }

    .login-tab-btn.active{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      border-color:transparent;
      box-shadow:0 10px 24px rgba(45,89,216,.2);
    }

    .rights-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 20px;
      background: #eef5ff;
      border: 1px solid #d8e6ff;
      color: #21409a;
      text-align: center;
      font-size: 13px;
      line-height: 1.9;
      font-weight: 800;
    }

    .fab-main {
      position: fixed;
      left: 18px;
      bottom: 86px;
      z-index: 40;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      box-shadow: 0 18px 40px rgba(45,89,216,.32);
      display:flex;
      align-items:center;
      justify-content:center;
      border:0;
    }

    .table-modern {
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }

    .table-modern th, .table-modern td {
      padding:10px;
      border-bottom:1px solid #eef2f7;
      text-align:right;
      vertical-align:top;
    }

    .table-modern th {
      background:#f8fafc;
      color:#334155;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .invoice-paper {
      width: 1100px;
      max-width: 100%;
      background: #fff;
      color: #0f172a;
      font-family: 'Cairo', Arial, sans-serif;
      padding: 24px;
    }

    .invoice-header {
      border: 1px solid #dbe7ff;
      background: linear-gradient(135deg, #eff5ff, #ffffff 60%);
      border-radius: 28px;
      padding: 20px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .invoice-brand {
      display:flex;
      gap:14px;
      align-items:flex-start;
      min-width:0;
      flex:1;
    }

    .invoice-logo {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      background: #fff;
      border: 1px solid #dbe7ff;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 8px 24px rgba(45,89,216,.12);
      flex-shrink:0;
    }

    .invoice-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.3;
      color: #0f172a;
    }

    .invoice-subtitle {
      font-size: 14px;
      color: #475569;
      margin-top: 6px;
      line-height: 1.9;
      font-weight: 700;
    }

    .invoice-meta {
      min-width: 290px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }

    .invoice-meta-row {
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:6px 0;
      border-bottom:1px dashed #e2e8f0;
      font-size:13px;
    }

    .invoice-meta-row:last-child { border-bottom:none; }

    .online-dot, .offline-dot {
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
    }

    .online-dot { background:#16a34a; box-shadow: 0 0 0 6px rgba(22,163,74,.12); }
    .offline-dot { background:#dc2626; box-shadow: 0 0 0 6px rgba(220,38,38,.12); }

    #print-area-inline { display: none; }

    body.printing-invoice > *:not(#print-area-inline) {
      display: none !important;
    }

    body.printing-invoice #print-area-inline {
      display: block !important;
      width: 100% !important;
      background: #fff !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    body.printing-invoice { background: #fff !important; }

    .color-palette-wrap{
      background:#f4f6f8;
      border:1px solid #e5e7eb;
      border-radius:30px;
      padding:20px;
    }

    .color-palette-grid{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-bottom:18px;
    }

    .color-swatch{
      width:56px;
      height:56px;
      border-radius:18px;
      border:3px solid #e5e7eb;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.85), 0 4px 10px rgba(15,23,42,.08);
      cursor:pointer;
      transition:.18s ease;
      position:relative;
      flex-shrink:0;
    }

    .color-swatch:hover{ transform:translateY(-1px) scale(1.03); }

    .color-swatch.active::after{
      content:"";
      position:absolute;
      inset:-5px;
      border-radius:22px;
      border:2px solid #cfd8e7;
    }

    .shortage-home-card{
      background:#fff;
      border:1px solid #e5e7eb;
      box-shadow: var(--shadow-soft);
      border-radius: 26px;
      padding: 18px;
    }

    .suggestions-box{
      margin-top:8px;
      border:1px solid #e5e7eb;
      border-radius:18px;
      background:#fff;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(15,23,42,.08);
      max-height:220px;
      overflow-y:auto;
    }

    .suggestion-item{
      width:100%;
      text-align:right;
      padding:12px 14px;
      background:#fff;
      border:0;
      border-bottom:1px solid #eef2f7;
      font-size:14px;
      color:#1e293b;
    }

    .suggestion-item:last-child{ border-bottom:none; }
    .suggestion-item:hover{ background:#f8fafc; }

    ::-webkit-scrollbar { width:7px; height:7px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:999px; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media print {
      body { background:#fff !important; }
      body.printing-invoice > *:not(#print-area-inline) { display: none !important; }
      body.printing-invoice #print-area-inline {
        display: block !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }
      .no-print { display:none !important; }
    }

    @media (max-width: 768px) {
      .invoice-paper { padding: 14px; }
      .invoice-header { padding: 16px; }
      .invoice-logo { width:72px; height:72px; }
      .invoice-title { font-size: 22px; }
      .invoice-meta { min-width:100%; }
      .color-swatch{ width:54px; height:54px; }
    }
  </style>
</head>
<body>

  <div id="loginRoot" class="login-shell">
    <div class="fancy-card w-full max-w-md rounded-[30px] p-6">
      <div class="text-center mb-6">
        <div class="w-16 h-16 mx-auto rounded-2xl text-white flex items-center justify-center text-2xl font-extrabold shadow-lg" style="background:linear-gradient(135deg,var(--primary),var(--primary-2));">
          <i class="fas fa-layer-group"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800 mt-4">تسجيل الدخول</h2>
        <p class="text-sm text-slate-500 mt-2">دخول مفتاح الشركة أو دخول موظف مباشر حسب نوع النسخة</p>
      </div>

      <div class="flex gap-2 mb-5">
        <button id="licenseTabBtn" type="button" class="login-tab-btn active">دخول بالمفتاح</button>
        <button id="employeeTabBtn" type="button" class="login-tab-btn">دخول موظف</button>
      </div>

      <div id="licenseLoginBox" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">مفتاح الدخول</label>
          <input id="licenseKeyInput" type="text" class="input" placeholder="أدخل مفتاح الاشتراك">
        </div>

        <div id="loginStatusBox" class="hidden-force text-sm rounded-xl p-3"></div>

        <button id="loginBtn" type="button" class="w-full btn text-white py-4 rounded-2xl font-extrabold shadow-lg" style="background:linear-gradient(135deg,var(--primary),var(--primary-2));">
          دخول
        </button>

        <div class="rights-box">
          هذا النظام يدعم أكثر من شركة<br>
          وكل شركة تعمل بمفتاح مستقل
        </div>

        <div class="text-xs text-center text-slate-400">
          اسم الشركة وصورتها يمكن تعديلهما من الإعدادات
        </div>

        <div class="text-center pt-1">
          <a href="https://wa.me/972597603119" target="_blank" class="inline-flex items-center gap-2 text-green-600 font-extrabold no-underline">
            <i class="fab fa-whatsapp text-lg"></i>
            <span>0597603119</span>
          </a>
        </div>
      </div>

      <div id="employeeLoginBox" class="space-y-4 hidden-force">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">اسم المستخدم</label>
          <input id="employeeUsername" type="text" class="input" placeholder="اسم المستخدم">
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
          <input id="employeePassword" type="password" class="input" placeholder="كلمة المرور">
        </div>

        <div id="employeeLoginStatusBox" class="hidden-force text-sm rounded-xl p-3"></div>

        <button id="employeeLoginBtn" type="button" class="w-full btn text-white py-4 rounded-2xl font-extrabold shadow-lg" style="background:linear-gradient(135deg,var(--primary),var(--primary-2));">
          دخول موظف
        </button>

        <div class="text-center pt-1">
          <a href="https://wa.me/972597603119" target="_blank" class="inline-flex items-center gap-2 text-green-600 font-extrabold no-underline">
            <i class="fab fa-whatsapp text-lg"></i>
            <span>0597603119</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="expiredRoot" class="login-shell hidden-force">
    <div class="fancy-card w-full max-w-md rounded-[28px] p-6 text-center">
      <div class="w-16 h-16 mx-auto rounded-full bg-red-100 flex items-center justify-center mb-4">
        <span class="text-3xl text-red-600">!</span>
      </div>
      <h2 id="expiredTitle" class="text-2xl font-extrabold text-red-700 mb-3">انتهى الاشتراك</h2>
      <p id="expiredText" class="text-sm text-slate-600 leading-8 mb-5">يرجى إدخال مفتاح صالح للمتابعة.</p>
      <button id="goToLoginBtn" type="button" class="w-full btn text-white py-4 rounded-2xl font-extrabold shadow-lg" style="background:linear-gradient(135deg,var(--primary),var(--primary-2));">
        العودة لتسجيل الدخول
      </button>
    </div>
  </div>

  <div id="appRoot" class="hidden-force">
    <div id="toast-root" class="toast-wrap no-print"></div>
    <div id="modal-root"></div>

    <header class="glass-header sticky top-0 z-50 text-slate-800 p-4 flex justify-between items-center no-print">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-14 h-14 bg-white rounded-[22px] overflow-hidden flex items-center justify-center shadow-lg shrink-0 border border-slate-200">
          <i class="fas fa-store text-[22px]" id="default-icon" style="color:var(--primary)"></i>
          <img id="header-logo" class="hidden-force w-full h-full object-cover">
        </div>

        <div class="min-w-0">
          <h1 id="header-shop-name" class="font-extrabold text-[20px] leading-tight truncate">اسم الشركة</h1>
          <div class="flex items-center gap-2 mt-1">
            <span id="connectionDot" class="online-dot"></span>
            <span id="connectionText" class="text-xs text-slate-500">متصل</span>
          </div>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button onclick="openSyncCenter()" class="p-2 hover:bg-white rounded-full transition-colors relative">
          <i class="fas fa-rotate text-lg"></i>
          <span id="pending-sync-badge" class="hidden-force absolute -top-1 -left-1 min-w-[18px] h-[18px] px-1 rounded-full text-white text-[10px] flex items-center justify-center" style="background:var(--primary)">0</span>
        </button>

        <button onclick="openAlertsModal()" class="p-2 hover:bg-white rounded-full transition-colors relative">
          <i class="fas fa-bell text-lg"></i>
          <span id="alerts-badge" class="hidden-force absolute -top-1 -left-1 min-w-[18px] h-[18px] px-1 rounded-full bg-red-500 text-white text-[10px] flex items-center justify-center">0</span>
        </button>

        <button onclick="navigate('settings')" class="p-2 hover:bg-white rounded-full transition-colors">
          <i class="fas fa-cog text-lg"></i>
        </button>
      </div>
    </header>

    <div id="top-sync-progress" class="top-sync-progress no-print">
      <div class="sync-spinner"></div>
      <div class="sync-label" id="top-sync-label">جارٍ المزامنة</div>
      <div class="sync-progress">
        <div id="sync-progress-fill" class="sync-progress-fill"></div>
      </div>
      <div id="sync-percent" class="sync-percent">0%</div>
    </div>

    <main id="app-container" class="p-4 max-w-5xl mx-auto"></main>

    <button class="fab-main no-print btn" onclick="openQuickActions()">
      <i class="fas fa-plus text-lg"></i>
    </button>

    <nav class="bottom-nav fixed bottom-0 left-0 right-0 flex justify-around p-2 no-print">
      <button onclick="navigate('home')" class="flex flex-col items-center p-2 text-[var(--primary)] nav-btn" id="nav-home">
        <i class="fas fa-home text-[22px]"></i>
        <span class="text-[10px] mt-1">الرئيسية</span>
      </button>

      <button onclick="navigate('customers')" class="flex flex-col items-center p-2 text-gray-500 nav-btn" id="nav-customers">
        <i class="fas fa-users text-[22px]"></i>
        <span class="text-[10px] mt-1">العملاء</span>
      </button>

      <button onclick="navigate('invoices')" class="flex flex-col items-center p-2 text-gray-500 nav-btn" id="nav-invoices">
        <i class="fas fa-file-invoice text-[22px]"></i>
        <span class="text-[10px] mt-1">الفواتير</span>
      </button>

      <button onclick="navigate('reports')" class="flex flex-col items-center p-2 text-gray-500 nav-btn" id="nav-reports">
        <i class="fas fa-chart-pie text-[22px]"></i>
        <span class="text-[10px] mt-1">التقارير</span>
      </button>

      <button onclick="navigate('settings')" class="flex flex-col items-center p-2 text-gray-500 nav-btn" id="nav-settings">
        <i class="fas fa-user-shield text-[22px]"></i>
        <span class="text-[10px] mt-1">الإعدادات</span>
      </button>
    </nav>

    <div id="capture-root" class="fixed -left-[99999px] top-0 w-[1150px] bg-white"></div>
    <div id="print-area-inline"></div>

    function parseNumber(v) {

    function todayISO() {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 16);
    }

    function toDateTimeLocalValue(dateValue) {
      if (!dateValue) return todayISO();
      const d = new Date(dateValue);
      if (isNaN(d.getTime())) return todayISO();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 16);
    }

    function formatCurrency(val) {

    function formatDate(dateStr, withTime = true) {

        year:"numeric", month:"2-digit", day:"2-digit"

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    function confirmDialog({
      title = "تأكيد العملية",
      message = "هل أنت متأكد؟",
      confirmText = "تأكيد",
      cancelText = "إلغاء",
      onConfirm = () => {}
    }) {
      window.__confirmAction = () => {
        try { onConfirm(); }
        finally {
          closeModal();
          window.__confirmAction = null;
        }
      };

      openModal({
        title,
        body: `<p class="text-sm text-slate-600 leading-7">${message}</p>`,
        footer: `
          <div class="flex gap-3">
            <button onclick="closeModal()" class="btn flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-bold">${cancelText}</button>
            <button onclick="window.__confirmAction && window.__confirmAction()" class="btn flex-1 py-3 rounded-2xl bg-red-600 hover:bg-red-700 text-white font-bold">${confirmText}</button>
          </div>
        `
      });
    }

    function getInvoiceStatusLabel(status) {
      if (status === "completed") return "مكتملة";
      if (status === "review") return "قيد المراجعة";
      return "غير مكتملة";
    }

    function getInvoiceStatusClass(status) {
      if (status === "completed") return "badge-green";
      if (status === "review") return "badge-yellow";
      return "badge-red";
    }

    function getInvoiceStatusHint(status) {
      if (status === "completed") return "تعني أن الفاتورة أُنجزت وتم اعتمادها.";
      if (status === "review") return "تعني أن الفاتورة بانتظار مراجعة أو تأكيد قبل اعتمادها.";
      return "تعني أن الفاتورة لم تُستكمل أو ما زال عليها مبلغ/إجراء.";
    }

    function calculateInvoiceTotals(invoice) {
      const subtotal = Number(invoice?.subtotal || 0);
      const discount = Number(invoice?.discount || 0);
      const total = Math.max(0, subtotal - discount);
      const paid = Number(invoice?.paidAmount || 0);
      const remaining = Math.max(0, total - paid);
      return { subtotal, discount, total, paid, remaining };
    }

    function rebuildCustomerBalances() {
      const map = {};
      (state.data.customers || []).forEach(c => map[c.id] = 0);

      (state.data.invoices || []).forEach(inv => {
        const remaining = calculateInvoiceTotals(inv).remaining;
        if (inv.customerId) map[inv.customerId] = (map[inv.customerId] || 0) + remaining;
      });

      (state.data.customers || []).forEach(customer => {
        const manualDebts = (customer.manualDebts || []).reduce((a,b)=> a + Number(b.amount || 0), 0);
        const payments = (customer.payments || []).reduce((a,b)=> a + Number(b.amount || 0), 0);
        customer.balance = Math.max(0, (map[customer.id] || 0) + manualDebts - payments);
      });
    }

    function getCustomerById(id) {
      return (state.data.customers || []).find(c => c.id === id);
    }

    function getInvoiceById(id) {
      return (state.data.invoices || []).find(i => i.id === id);
    }

    function getPurchaseById(id) {
      return (state.data.purchases || []).find(i => i.id === id);
    }

    function getCreditLimit(customer) {
      return Number(customer?.creditLimit ?? state.data.settings.defaultCreditLimit ?? 0);
    }

    function getLastPaymentDate(customer) {
      const payments = (customer?.payments || []).slice().sort((a,b)=> new Date(b.date) - new Date(a.date));
      return payments[0]?.date || null;
    }

    function getDaysSince(dateStr) {
      if (!dateStr) return 0;
      const diff = Date.now() - new Date(dateStr).getTime();
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getOverdueStatus(customer) {
      const balance = Number(customer?.balance || 0);
      if (balance <= 0) return { overdue:false, days:0 };

      const lastPayment = getLastPaymentDate(customer);
      const oldestInvoice = (state.data.invoices || [])
        .filter(i => i.customerId === customer.id)
        .sort((a,b)=> new Date(a.date)-new Date(b.date))[0];

      const oldestManualDebt = (customer.manualDebts || [])
        .slice()
        .sort((a,b)=> new Date(a.date)-new Date(b.date))[0];

      const refDate = lastPayment || oldestInvoice?.date || oldestManualDebt?.date;
      if (!refDate) return { overdue:false, days:0 };

      const days = getDaysSince(refDate);
      const overdue = days >= Number(state.data.settings.overdueDaysThreshold || 14);
      return { overdue, days };
    }

    function getCustomerReminderText() {
      if (!state.data.settings.customerReminderEnabled) return "";
      const count = Number(state.data.settings.customerReminderCount || 1);
      if (state.data.settings.customerReminderType === "weekly") {
        return `تنبيه أسبوعي كل ${count} أسبوع`;
      }
      if (state.data.settings.customerReminderType === "monthly") {
        return `تنبيه شهري كل ${count} شهر`;
      }
      return `تنبيه يومي كل ${count} يوم`;
    }

    function getAllAlerts() {
      const alerts = [];

      (state.data.customers || []).forEach(customer => {
        const balance = Number(customer.balance || 0);
        const limit = getCreditLimit(customer);

        if (state.data.settings.enableCreditLimitAlerts && limit > 0 && balance > limit) {
          alerts.push({
            type: "credit",
            customerId: customer.id,
            title: "تجاوز الحد الائتماني",
            text: `${customer.name} تجاوز الحد الائتماني`
          });
        }

        const overdue = getOverdueStatus(customer);
        if (state.data.settings.enableOverdueAlerts && overdue.overdue) {
          alerts.push({
            type: "overdue",
            customerId: customer.id,
            title: "تأخر في السداد",
            text: `${customer.name} متأخر عن السداد منذ ${overdue.days} يوم`
          });
        }
      });

      return alerts;
    }

    function updateAlertsBadge() {
      const alerts = getAllAlerts();
      const badge = document.getElementById("alerts-badge");
      if (!badge) return;
      badge.innerText = alerts.length;
      badge.classList.toggle("hidden-force", alerts.length === 0);
    }

    function getUserDisplayName(userId) {
      const user = (state.data.users || []).find(u => u.id === userId);

    function updateConnectionUI() {
      const dot = document.getElementById("connectionDot");
      const txt = document.getElementById("connectionText");
      if (!dot || !txt) return;

      if (state.session.loginSource === "employee_direct") {
        if (navigator.onLine) {
          dot.className = "online-dot";
          txt.textContent = "موظف مباشر";
        } else {
          dot.className = "offline-dot";
          txt.textContent = "بانتظار الإنترنت";
        }
        return;
      }

      if (state.session.loginSource === "license_user") {
        if (navigator.onLine) {
          dot.className = "online-dot";
          txt.textContent = "مستخدم الشركة";
        } else {
          dot.className = "offline-dot";
          txt.textContent = "أوفلاين";
        }
        return;
      }

      if (isLocalOnlyMode()) {
        dot.className = "online-dot";
        txt.textContent = "نسخة محلية";
        return;
      }

      if (navigator.onLine) {
        dot.className = "online-dot";
        txt.textContent = "متصل";
      } else {
        dot.className = "offline-dot";

    async function pushCustomShopNameToLicense() {
      const license = getCurrentLicense();
      if (!license?.key || !navigator.onLine || isLocalOnlyMode()) return false;

      try {
        await ensureFirebaseReady();
        const { ref, update } = window.feeFirebase;
        await update(ref(firebaseDbRef, getLicenseSettingsPath(license.key)), {

          updatedAt: Date.now()
        });
        return true;
      } catch (error) {
        console.error(error);
        return false;
      }
    }

    async function pullCustomShopNameFromLicense(licenseKey) {
      if (!licenseKey || !navigator.onLine) return false;
      try {
        await ensureFirebaseReady();
        const { ref, get } = window.feeFirebase;
        const snap = await get(ref(firebaseDbRef, getLicenseSettingsPath(licenseKey)));
        if (!snap.exists()) return false;

        const custom = snap.val() || {};
        if (custom.companyName) state.data.settings.companyName = custom.companyName;
        if (custom.shopName) state.data.settings.shopName = custom.shopName || custom.companyName;
        return true;
      } catch (error) {
        console.error(error);
        return false;
      }
    }

    async function pushFullStateToCloud() {
      if (!navigator.onLine) return false;
      if (isLocalOnlyMode()) return false;

      const rootPath = getActiveCloudRootPath();
      if (!rootPath) return false;

      try {
        await ensureFirebaseReady();
        const { ref, set, update } = window.feeFirebase;

        state.syncStatus = "syncing";
        updateSyncProgress(15, "رفع البيانات");

        const payloadSettings = {
          ...state.data.settings,
          companyName: state.data.settings.companyName || DEFAULT_SETTINGS.companyName,
          shopName: state.data.settings.shopName || state.data.settings.companyName || DEFAULT_SETTINGS.shopName
        };

        await set(ref(firebaseDbRef, `${rootPath}/appState`), {
          settings: payloadSettings,
          customers: state.data.customers,
          invoices: state.data.invoices,
          users: state.data.users,
          shortages: state.data.shortages,
          purchases: state.data.purchases,
          updatedAt: Date.now(),
          updatedBy: state.session.userId || "owner"
        });

        updateSyncProgress(75, "تحديث السحابة");

        await update(ref(firebaseDbRef, `${rootPath}/meta`), {
          updatedAt: Date.now(),
          updatedBy: state.session.userId || "owner",
          installationId: generateInstallationId()
        });

        await pushCustomShopNameToLicense();

        updateSyncProgress(100, "اكتملت المزامنة");
        setTimeout(() => {
          state.syncStatus = "idle";
          hideTopSync();
        }, 500);

        return true;
      } catch (error) {
        console.error(error);
        state.syncStatus = "idle";
        hideTopSync();
        return false;
      }
    }

    async function pullFullStateFromCloud() {
      if (!navigator.onLine) return false;
      if (isLocalOnlyMode()) return false;

      const rootPath = getActiveCloudRootPath();
      if (!rootPath) return false;

      try {
        await ensureFirebaseReady();
        const { ref, get } = window.feeFirebase;

        state.syncStatus = "syncing";
        updateSyncProgress(20, "سحب البيانات");

        const snap = await get(ref(firebaseDbRef, `${rootPath}/appState`));
        if (!snap.exists()) {
          state.syncStatus = "idle";
          hideTopSync();
          return false;
        }

        const cloud = snap.val() || {};
        state.data.settings = { ...DEFAULT_SETTINGS, ...(cloud.settings || {}) };
        state.data.customers = cloud.customers || [];
        state.data.invoices = cloud.invoices || [];
        state.data.users = cloud.users || state.data.users;
        state.data.shortages = cloud.shortages || [];
        state.data.purchases = cloud.purchases || [];
        state.data.meta.updatedAt = new Date().toISOString();

        const currentLicense = getCurrentLicense();
        if (currentLicense?.key) {
          await pullCustomShopNameFromLicense(currentLicense.key);
        }

        applyTheme();
        saveAppState();

        updateSyncProgress(100, "تم تحديث البيانات");
        setTimeout(() => {
          state.syncStatus = "idle";
          hideTopSync();
        }, 500);

        return true;
      } catch (error) {
        console.error(error);
        state.syncStatus = "idle";
        hideTopSync();
        return false;
      }
    }

    function detachRealtimeSync() {
      if (typeof realtimeDetachFn === "function") {
        try { realtimeDetachFn(); } catch {}
      }
      realtimeDetachFn = null;
    }

    async function attachRealtimeSync() {
      detachRealtimeSync();

      if (!navigator.onLine) return;
      if (isLocalOnlyMode()) return;

      const rootPath = getActiveCloudRootPath();
      if (!rootPath) return;

      try {
        await ensureFirebaseReady();
        const { ref, onValue, off } = window.feeFirebase;
        const appStateRef = ref(firebaseDbRef, `${rootPath}/appState`);

        const cb = snapshot => {
          if (!snapshot.exists()) return;
          const remote = snapshot.val() || {};
          const localUpdated = new Date(state.data.meta?.updatedAt || 0).getTime();
          const remoteUpdated = Number(remote.updatedAt || 0);
          if (remoteUpdated && remoteUpdated <= localUpdated) return;

          state.syncStatus = "syncing";
          updateSyncProgress(35, "تحديث تلقائي");

          state.data.settings = { ...DEFAULT_SETTINGS, ...(remote.settings || {}) };
          state.data.customers = remote.customers || [];
          state.data.invoices = remote.invoices || [];
          state.data.users = remote.users || state.data.users;
          state.data.shortages = remote.shortages || [];
          state.data.purchases = remote.purchases || [];
          state.data.meta.updatedAt = new Date().toISOString();

          applyTheme();
          saveAppState();
          render();

          updateSyncProgress(100, "تم التحديث");
          setTimeout(() => {
            state.syncStatus = "idle";
            hideTopSync();
          }, 500);
        };

        onValue(appStateRef, cb);
        realtimeDetachFn = () => off(appStateRef, "value", cb);
      } catch (error) {
        console.error(error);
        state.syncStatus = "idle";
        hideTopSync();
      }
    }

    async function syncQueueToCloud() {
      if (isLocalOnlyMode()) {
        state.syncStatus = "idle";
        hideTopSync();
        return true;
      }

      if (!navigator.onLine) {
        state.syncStatus = "idle";
        hideTopSync();
        return false;
      }

      state.syncStatus = "syncing";
      updateSyncProgress(10, "جارٍ المزامنة");

      const ok = await pushFullStateToCloud();
      if (!ok) {
        state.syncStatus = "idle";
        hideTopSync();
        return false;
      }

      state.queue = [];
      localStorage.setItem(getQueueKey(), JSON.stringify(state.queue));
      updatePendingSyncBadge();

      state.syncStatus = "idle";
      hideTopSync();
      return true;
    }

    async function manualSync() {
      if (isLocalOnlyMode()) return;
      if (!navigator.onLine) return;

      state.syncStatus = "syncing";
      updateSyncProgress(10, "جارٍ المزامنة");
      await pullFullStateFromCloud();
      await syncQueueToCloud();
      await attachRealtimeSync();
      render();
    }

    }

        .slice(0, 6);
    }

    async function renderInvoiceCanvas(invoiceId) {
      const root = document.getElementById("capture-root");
      root.innerHTML = buildInvoiceHTML(invoiceId);
      const element = root.firstElementChild;
      if (!element) throw new Error("تعذر إنشاء الفاتورة");
      const canvas = await html2canvas(element, {
        scale: 2,
        backgroundColor: "#ffffff",
        useCORS: true,
        allowTaint: false
      });
      return { root, canvas };
    }

    function buildCustomerExportHTML(customerId) {
      return buildCustomerStatementHTML(customerId);
    }

    async function renderCustomerCardCanvas(customerId) {
      const root = document.getElementById("capture-root");
      root.innerHTML = buildCustomerExportHTML(customerId);
      const element = root.firstElementChild;
      if (!element) throw new Error("تعذر إنشاء كشف العميل");
      const canvas = await html2canvas(element, {
        scale: 2,
        backgroundColor: "#ffffff",
        useCORS: true,
        allowTaint: false
      });
      return { root, canvas };
    }

    async function safePrintFromCanvas(rendererFn) {
      if (printInProgress) return;
      printInProgress = true;

      const printArea = document.getElementById("print-area-inline");
      const root = document.getElementById("capture-root");

      try {
        const { canvas } = await rendererFn();
        const dataUrl = canvas.toDataURL("image/png");

        printArea.innerHTML = `
          <div style="padding:0;margin:0;text-align:center;background:#fff;">
            <img src="${dataUrl}" style="max-width:100%;width:100%;display:block;margin:0 auto;">
          </div>
        `;

        document.body.classList.add("printing-invoice");

        const cleanup = () => {
          document.body.classList.remove("printing-invoice");
          printArea.innerHTML = "";
          root.innerHTML = "";
          printInProgress = false;
          window.removeEventListener("afterprint", cleanup);
        };

        window.addEventListener("afterprint", cleanup, { once: true });

        setTimeout(() => {
          window.print();
          setTimeout(() => {
            cleanup();
          }, 1200);
        }, 250);
      } catch (error) {
        console.error(error);
        printInProgress = false;
        document.body.classList.remove("printing-invoice");
        if (printArea) printArea.innerHTML = "";
        if (root) root.innerHTML = "";
        showToast("تعذر تنفيذ الطباعة", "error");
      }
    }

    async function printInvoice(invoiceId) {
      const invoice = getInvoiceById(invoiceId);
      if (!invoice) return;
      await safePrintFromCanvas(() => renderInvoiceCanvas(invoiceId));
    }

    async function printCustomerCard(customerId) {
      const customer = getCustomerById(customerId);
      if (!customer) return;
      await safePrintFromCanvas(() => renderCustomerCardCanvas(customerId));
    }

<script>
  function getSavedReportFilters() {
    try {
      return JSON.parse(localStorage.getItem(getReportFiltersKey()) || "null") || {
        from: "",
        to: "",
        customerId: "",
        itemName: ""
      };
    } catch {
      return { from: "", to: "", customerId: "", itemName: "" };
    }
  }

  function saveReportFilters(filters) {
    try {
      localStorage.setItem(getReportFiltersKey(), JSON.stringify(filters));
    } catch {}
  }

  function collectReportFiltersFromUI() {
    return {
      from: document.getElementById("report-filter-from")?.value || "",
      to: document.getElementById("report-filter-to")?.value || "",
      customerId: document.getElementById("report-filter-customer")?.value || "",
      itemName: (document.getElementById("report-filter-item")?.value || "").trim()
    };
  }

  function applyReportFiltersToInvoices() {
    const filters = collectReportFiltersFromUI();
    saveReportFilters(filters);

    return (state.data.invoices || []).filter(inv => {
      const invDate = new Date(inv.date);
      if (filters.from) {
        const fromDate = new Date(filters.from);
        if (invDate < fromDate) return false;
      }
      if (filters.to) {
        const toDate = new Date(filters.to);
        toDate.setHours(23,59,59,999);
        if (invDate > toDate) return false;
      }
      if (filters.customerId && inv.customerId !== filters.customerId) return false;
      if (filters.itemName) {
        const hasItem = (inv.items || []).some(item => (item.name || "").toLowerCase().includes(filters.itemName.toLowerCase()));
        if (!hasItem) return false;
      }
      return true;
    });
  }

  function getReportsData() {
    const filteredInvoices = applyReportFiltersToInvoices();

    const totalCustomers = state.data.customers.length;
    const totalInvoices = filteredInvoices.length;
    const totalSales = filteredInvoices.reduce((a,b)=> a + calculateInvoiceTotals(b).total, 0);
    const totalPaid = filteredInvoices.reduce((a,b)=> a + calculateInvoiceTotals(b).paid, 0);
    const totalDiscount = filteredInvoices.reduce((a,b)=> a + Number(b.discount || 0), 0);
    const totalRemaining = filteredInvoices.reduce((a,b)=> a + calculateInvoiceTotals(b).remaining, 0);
    const totalPurchases = (state.data.purchases || []).reduce((a,b)=> a + Number(b.price || 0), 0);

    const customerMap = {};
    filteredInvoices.forEach(inv => {
      const customer = getCustomerById(inv.customerId);
      const key = inv.customerId || "unknown";
      if (!customerMap[key]) {
        customerMap[key] = {
          customerId: inv.customerId,
          customerName: customer?.name || "عميل غير معروف",
          invoiceCount: 0,
          total: 0,
          paid: 0,
          remaining: 0
        };
      }
      const t = calculateInvoiceTotals(inv);
      customerMap[key].invoiceCount += 1;
      customerMap[key].total += t.total;
      customerMap[key].paid += t.paid;
      customerMap[key].remaining += t.remaining;
    });

    const itemMap = {};
    filteredInvoices.forEach(inv => {
      (inv.items || []).forEach(item => {
        const key = (item.name || "غير محدد").trim() || "غير محدد";
        if (!itemMap[key]) {
          itemMap[key] = {
            itemName: key,
            qty: 0,
            sales: 0,
            invoiceCount: 0
          };
        }
        itemMap[key].qty += Number(item.qty || 0);
        itemMap[key].sales += Number(item.total || 0);
        itemMap[key].invoiceCount += 1;
      });
    });

    const customerRows = Object.values(customerMap).sort((a,b) => b.total - a.total);
    const itemRows = Object.values(itemMap).sort((a,b) => b.sales - a.sales);

    return {
      filters: collectReportFiltersFromUI(),
      filteredInvoices,
      totalCustomers,
      totalInvoices,
      totalSales,
      totalPaid,
      totalDiscount,
      totalRemaining,
      totalPurchases,
      customerRows,
      itemRows
    };
  }

  function renderReports(el) {
    if (!state.session.permissions.canViewReports) {
      el.innerHTML = `
        <div class="section-card p-8 text-center">
          <div class="w-16 h-16 mx-auto rounded-full bg-amber-100 text-amber-600 flex items-center justify-center text-2xl mb-4">
            <i class="fas fa-lock"></i>
          </div>
          <h2 class="text-2xl font-extrabold text-slate-800">التقارير محجوبة</h2>
          <p class="text-sm text-slate-500 mt-3">ليس لديك صلاحية لعرض التقارير المالية</p>
        </div>
      `;
      return;
    }

<script>
  function showUserLoginModal() {
    openModal({
      title: "تسجيل دخول مستخدم",
      maxWidth: "520px",
      body: `
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">اسم المستخدم</label>
            <input id="local-user-username" type="text" class="input">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
            <input id="local-user-password" type="password" class="input">
          </div>
        </div>
      `,
      footer: `
        <div class="flex gap-3">
          <button onclick="closeModal()" class="btn flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-bold">إلغاء</button>
          <button onclick="loginLocalUser()" class="btn flex-1 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-extrabold">دخول</button>
        </div>
      `
    });
  }

  function loginLocalUser() {
    const username = document.getElementById("local-user-username")?.value?.trim();
    const password = document.getElementById("local-user-password")?.value?.trim();

    const user = (state.data.users || []).find(u =>
      u.username === username &&
      u.password === password &&
      u.isActive !== false
    );

    if (!user) {
      showToast("بيانات الدخول غير صحيحة", "error");
      return;
    }

    state.session = normalizeSession({
      userId: user.id,
      displayName: user.name || user.username,
      role: user.role || "user",
      loginSource: "license_user",
      permissions: {
        ...(user.role === "admin" ? DEFAULT_USER_PERMISSIONS : EMPLOYEE_DEFAULT_PERMISSIONS),
        ...(user.permissions || {})
      }
    });

    setForceLoginOnly(false);
    closeModal();
    saveAppState();
    render();
    showToast(`مرحبًا ${state.session.displayName}`, "success");
  }

  function logoutLocalUser() {
    if (state.session.loginSource === "employee_direct") {
      detachRealtimeSync();
      clearSessionState();
      state.session = getEmptyLoggedOutSession();
      setForceLoginOnly(true);
      setShell("login");
      setLoginMode("employee");
      saveAppState();
      showToast("تم تسجيل خروج الموظف", "success");
      return;
    }

    state.session = getDefaultAdminSession();
    setForceLoginOnly(false);
    saveAppState();
    render();
    showToast("تم تسجيل خروج المستخدم", "success");
  }

  function logoutLicenseCompletely() {
    confirmDialog({
      title: "تسجيل خروج المفتاح",
      message: "سيتم تسجيل خروج المفتاح الحالي والعودة لصفحة الدخول. هل تريد المتابعة؟",
      confirmText: "تسجيل الخروج",
      cancelText: "إلغاء",
      onConfirm: () => {
        detachRealtimeSync();
        clearSessionState();
        clearCachedLicense();
        setForceLoginOnly(false);
        state.session = getEmptyLoggedOutSession();
        setShell("login");
        setLoginMode("license");
        showToast("تم تسجيل خروج المفتاح", "success");
      }
    });
  }

  async function saveSettings() {
    state.data.settings.companyName = document.getElementById("set-company-name")?.value?.trim() || DEFAULT_SETTINGS.companyName;
    state.data.settings.companySecondaryName = document.getElementById("set-company-secondary-name")?.value?.trim() || "";
    state.data.settings.shopName = state.data.settings.companyName;
    state.data.settings.shopPhone = document.getElementById("set-shop-phone")?.value?.trim() || "";
    state.data.settings.shopAddress = document.getElementById("set-shop-address")?.value?.trim() || "";
    state.data.settings.currency = document.getElementById("set-currency")?.value?.trim() || "شيكل";
    state.data.settings.footerNote = document.getElementById("set-footer-note")?.value?.trim() || "شكرًا لتعاملكم معنا";
    state.data.settings.primaryColor = document.getElementById("set-primary-color")?.value || "#2d59d8";
    state.data.settings.printEmployeeName = !!document.getElementById("set-print-employee-name")?.checked;
    state.data.settings.customerReminderEnabled = !!document.getElementById("set-customer-reminder-enabled")?.checked;
    state.data.settings.customerReminderType = document.getElementById("set-customer-reminder-type")?.value || "daily";
    state.data.settings.customerReminderCount = Math.max(1, parseNumber(document.getElementById("set-customer-reminder-count")?.value) || 1);

    const logoUrl = document.getElementById("set-logo-url")?.value?.trim() || "";
    const logoFile = document.getElementById("set-logo-file")?.files?.[0];

    if (logoFile) {
      const reader = new FileReader();
      reader.onload = e => {
        state.data.settings.logo = e.target.result;
        state.data.settings.logoType = "file";
        finishSaveSettings();
      };
      reader.readAsDataURL(logoFile);
      return;
    } else if (logoUrl) {
      state.data.settings.logo = logoUrl;
      state.data.settings.logoType = "url";
    }

    finishSaveSettings();
  }

  async function finishSaveSettings() {
    applyTheme();
    enqueueSyncOperation({ type: "save_settings", payload: { companyName: state.data.settings.companyName } });
    saveAppState();
    render();

    if (!isLocalOnlyMode() && navigator.onLine) {
      await pushCustomShopNameToLicense();
      await syncQueueToCloud();
    }

    showToast("تم حفظ الإعدادات", "success");
  }
</script>

<script>
  function showAddUserModal() {
    openModal({
      title: "إنشاء موظف جديد",
      maxWidth: "860px",
      body: `
        <div class="space-y-4">
          <div class="grid sm:grid-cols-3 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">الاسم</label>
              <input id="new-user-name" type="text" class="input">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">اسم المستخدم</label>
              <input id="new-user-username" type="text" class="input">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
              <input id="new-user-password" type="text" class="input">
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">الدور</label>
            <select id="new-user-role" class="select" onchange="applyRolePresetToUserForm()">
              <option value="user">موظف</option>
              <option value="admin">مدير</option>
            </select>
          </div>

          <div class="grid sm:grid-cols-2 gap-3">
            ${renderPermissionCheckboxes("new-user")}
          </div>
        </div>
      `,
      footer: `
        <div class="flex gap-3">
          <button onclick="closeModal()" class="btn flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-bold">إلغاء</button>
          <button onclick="saveNewUser()" class="btn flex-1 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-extrabold">حفظ الموظف</button>
        </div>
      `
    });

    applyRolePresetToUserForm();
  }

  function applyRolePresetToUserForm() {
    const role = document.getElementById("new-user-role")?.value || "user";
    const perms = role === "admin" ? DEFAULT_USER_PERMISSIONS : EMPLOYEE_DEFAULT_PERMISSIONS;

    Object.keys(DEFAULT_USER_PERMISSIONS).forEach(key => {
      const el = document.getElementById(`new-user-${key}`);
      if (el) el.checked = !!perms[key];
    });
  }

  function saveNewUser() {
    const name = document.getElementById("new-user-name")?.value?.trim();
    const username = document.getElementById("new-user-username")?.value?.trim();
    const password = document.getElementById("new-user-password")?.value?.trim();
    const role = document.getElementById("new-user-role")?.value || "user";
    const permissions = collectPermissionsFromForm("new-user");

    if (!name || !username || !password) {
      showToast("يرجى تعبئة الاسم واسم المستخدم وكلمة المرور", "error");
      return;
    }

    if (state.data.users.some(u => u.username === username)) {
      showToast("اسم المستخدم مستخدم بالفعل", "error");
      return;
    }

    state.data.users.push({
      id: uid("user"),
      name,
      username,
      password,
      role,
      isActive: true,
      permissions,
      createdAt: new Date().toISOString()
    });

    enqueueSyncOperation({ type: "add_user", payload: { username, role } });
    saveAppState();
    closeModal();
    render();
    showToast("تم إنشاء الموظف بنجاح", "success");
    if (!isLocalOnlyMode() && navigator.onLine) syncQueueToCloud();
  }

  function showEditUserModal(userId) {
    const user = state.data.users.find(u => u.id === userId);
    if (!user) return;

    openModal({
      title: `تعديل المستخدم ${user.name}`,
      maxWidth: "860px",
      body: `
        <div class="space-y-4">
          <div class="grid sm:grid-cols-3 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">الاسم</label>
              <input id="edit-user-name" type="text" class="input" value="${escapeHtml(user.name || "")}">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">اسم المستخدم</label>
              <input id="edit-user-username" type="text" class="input" value="${escapeHtml(user.username || "")}">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
              <input id="edit-user-password" type="text" class="input" value="${escapeHtml(user.password || "")}">
            </div>
          </div>

          <div class="grid sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">الدور</label>
              <select id="edit-user-role" class="select">
                <option value="user" ${user.role === "user" ? "selected" : ""}>موظف</option>
                <option value="admin" ${user.role === "admin" ? "selected" : ""}>مدير</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">الحالة</label>
              <select id="edit-user-status" class="select">
                <option value="active" ${user.isActive ? "selected" : ""}>نشط</option>
                <option value="inactive" ${!user.isActive ? "selected" : ""}>معطل</option>
              </select>
            </div>
          </div>

          <div class="grid sm:grid-cols-2 gap-3">
            ${renderPermissionCheckboxes("edit-user", user.permissions || EMPLOYEE_DEFAULT_PERMISSIONS)}
          </div>
        </div>
      `,
      footer: `
        <div class="flex gap-3">
          <button onclick="closeModal()" class="btn flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-bold">إلغاء</button>
          <button onclick="saveEditedUser('${userId}')" class="btn flex-1 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-extrabold">حفظ التعديل</button>
        </div>
      `
    });
  }

  function saveEditedUser(userId) {
    const user = state.data.users.find(u => u.id === userId);
    if (!user) return;

    const name = document.getElementById("edit-user-name")?.value?.trim();
    const username = document.getElementById("edit-user-username")?.value?.trim();
    const password = document.getElementById("edit-user-password")?.value?.trim();
    const role = document.getElementById("edit-user-role")?.value || "user";
    const isActive = document.getElementById("edit-user-status")?.value === "active";
    const permissions = collectPermissionsFromForm("edit-user");

    if (!name || !username || !password) {
      showToast("يرجى تعبئة البيانات الأساسية", "error");
      return;
    }

    const duplicate = state.data.users.find(u => u.username === username && u.id !== userId);
    if (duplicate) {
      showToast("اسم المستخدم مستخدم بالفعل", "error");
      return;
    }

    user.name = name;
    user.username = username;
    user.password = password;
    user.role = role;
    user.isActive = isActive;
    user.permissions = permissions;
    user.updatedAt = new Date().toISOString();

    enqueueSyncOperation({ type: "edit_user", payload: { userId, username } });
    saveAppState();
    closeModal();
    render();
    showToast("تم تعديل المستخدم", "success");
    if (!isLocalOnlyMode() && navigator.onLine) syncQueueToCloud();
  }

  function deleteUser(userId) {
    const user = state.data.users.find(u => u.id === userId);
    if (!user) return;

    confirmDialog({
      title: "حذف المستخدم",
      message: `هل تريد حذف المستخدم "${user.name}" نهائيًا؟`,
      confirmText: "حذف",
      cancelText: "إلغاء",
      onConfirm: () => {
        state.data.users = state.data.users.filter(u => u.id !== userId);
        enqueueSyncOperation({ type: "delete_user", payload: { userId } });
        saveAppState();
        render();
        showToast("تم حذف المستخدم", "success");
        if (!isLocalOnlyMode() && navigator.onLine) syncQueueToCloud();
      }
    });
  }
</script>

<script>
  function showAddCustomerModal() {
    openModal({
      title: "إضافة عميل جديد",
      body: `
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">اسم العميل</label>
            <input id="customer-name" type="text" class="input" placeholder="مثال: أحمد محمد">
          </div>

          <div class="grid sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">رقم الهاتف</label>
              <input id="customer-phone" type="text" class="input" placeholder="اختياري">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">الحد الائتماني</label>
              <input id="customer-credit-limit" type="number" class="input" value="${state.data.settings.defaultCreditLimit || 0}">
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">العنوان</label>
            <input id="customer-address" type="text" class="input">
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">ملاحظات</label>
            <textarea id="customer-notes" class="textarea"></textarea>
          </div>
        </div>
      `,
      footer: `
        <div class="flex gap-3">
          <button onclick="closeModal()" class="btn flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-bold">إلغاء</button>
          <button onclick="addCustomer()" class="btn flex-1 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-extrabold">حفظ العميل</button>
        </div>
      `
    });
  }

  function addCustomer() {
    const name = document.getElementById("customer-name")?.value?.trim();
    const phone = document.getElementById("customer-phone")?.value?.trim() || "";
    const creditLimit = parseNumber(document.getElementById("customer-credit-limit")?.value);
    const address = document.getElementById("customer-address")?.value?.trim() || "";
    const notes = document.getElementById("customer-notes")?.value?.trim() || "";

    if (!name) {
      showToast("اسم العميل إجباري", "error");
      return;
    }

    state.data.customers.push({
      id: uid("cust"),
      name,
      phone,
      address,
      notes,
      creditLimit,
      balance: 0,
      payments: [],
      manualDebts: [],
      createdAt: new Date().toISOString()
    });

  async function downloadInvoicePDF(invoiceId) {
    const invoice = getInvoiceById(invoiceId);
    if (!invoice) return;

    const { root, canvas } = await renderInvoiceCanvas(invoiceId);
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageHeight = 297;
    const imgWidth = 190;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 10;

    pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
    heightLeft -= (pageHeight - 20);

    while (heightLeft > 0) {
      position = heightLeft - imgHeight + 10;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - 20);
    }

    pdf.save(`${invoice.invoiceNumber}.pdf`);
    root.innerHTML = "";
    showToast("تم حفظ الفاتورة PDF", "success");
  }

  async function downloadInvoiceImage(invoiceId) {
    const invoice = getInvoiceById(invoiceId);
    if (!invoice) return;

    const { root, canvas } = await renderInvoiceCanvas(invoiceId);
    const imageData = canvas.toDataURL("image/png");
    const link = document.createElement("a");
    link.href = imageData;
    link.download = `${invoice.invoiceNumber}.png`;
    link.click();
    root.innerHTML = "";
    showToast("تم حفظ الفاتورة كصورة", "success");
  }

  function downloadInvoiceExcel(invoiceId) {
    const invoice = getInvoiceById(invoiceId);
    if (!invoice) return;

    const customer = getCustomerById(invoice.customerId);
    const totals = calculateInvoiceTotals(invoice);

    const rows = [
      ["اسم الشركة", state.data.settings.shopName || state.data.settings.companyName || ""],
      ["رقم الفاتورة", invoice.invoiceNumber || ""],
      ["العميل", customer?.name || ""],
      ["الهاتف", customer?.phone || ""],
      ["التاريخ", formatDate(invoice.date)],
      ["الحالة", getInvoiceStatusLabel(invoice.status || "pending")],
      ...(state.data.settings.printEmployeeName ? [["الموظف", getUserDisplayName(invoice.createdBy)]] : []),
      [],
      ["الصنف", "الكمية", "السعر", "الإجمالي"],
      ...(invoice.items || []).map(item => [item.name || "", item.qty || 0, item.price || 0, item.total || 0]),
      [],
      ["الإجمالي الفرعي", totals.subtotal],
      ["الخصم", totals.discount],
      ["الإجمالي النهائي", totals.total],
      ["المدفوع", totals.paid],
      ["الديون", totals.remaining],
      ["الملاحظات", invoice.note || state.data.settings.footerNote || ""]
    ];

    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "فاتورة");
    XLSX.writeFile(wb, `${invoice.invoiceNumber}.xlsx`);
    showToast("تم حفظ الفاتورة Excel", "success");
  }

  function downloadInvoiceWord(invoiceId) {
    const invoice = getInvoiceById(invoiceId);
    if (!invoice) return;

    const customer = getCustomerById(invoice.customerId);
    const totals = calculateInvoiceTotals(invoice);

    const html = `
      <html dir="rtl" lang="ar">
      <head><meta charset="utf-8"></head>
      <body>
        <h2>${escapeHtml(state.data.settings.shopName || state.data.settings.companyName || "")}</h2>
        <p>رقم الفاتورة: ${escapeHtml(invoice.invoiceNumber || "")}</p>
        <p>العميل: ${escapeHtml(customer?.name || "")}</p>
        <p>الهاتف: ${escapeHtml(customer?.phone || "")}</p>
        <p>التاريخ: ${escapeHtml(formatDate(invoice.date))}</p>
        <p>الحالة: ${escapeHtml(getInvoiceStatusLabel(invoice.status || "pending"))}</p>
        ${state.data.settings.printEmployeeName ? `<p>الموظف: ${escapeHtml(getUserDisplayName(invoice.createdBy))}</p>` : ""}
        <table border="1" style="border-collapse:collapse;width:100%;text-align:right">
          <tr><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
          ${(invoice.items || []).map(item => `
            <tr>
              <td>${escapeHtml(item.name || "")}</td>
              <td>${item.qty || 0}</td>
              <td>${escapeHtml(formatCurrency(item.price || 0))}</td>
              <td>${escapeHtml(formatCurrency(item.total || 0))}</td>
            </tr>
          `).join("")}
        </table>
        <p>الإجمالي الفرعي: ${escapeHtml(formatCurrency(totals.subtotal))}</p>
        <p>الخصم: ${escapeHtml(formatCurrency(totals.discount))}</p>
        <p>الإجمالي النهائي: ${escapeHtml(formatCurrency(totals.total))}</p>
        <p>المدفوع: ${escapeHtml(formatCurrency(totals.paid))}</p>
        <p>الديون: ${escapeHtml(formatCurrency(totals.remaining))}</p>
        <p>ملاحظات: ${escapeHtml(invoice.note || state.data.settings.footerNote || "")}</p>
      </body>
      </html>
    `;

    const blob = new Blob(['\ufeff', html], { type: "application/msword;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${invoice.invoiceNumber}.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    showToast("تم حفظ الفاتورة Word", "success");
  }
</script>

<script>
  function buildCustomerStatementHTML(customerId) {

    const invoices = (state.data.invoices || []).filter(i => i.customerId === customer.id).sort((a,b)=> new Date(b.date)-new Date(a.date));

    const manualDebts = (customer.manualDebts || []).slice().sort((a,b)=> new Date(b.date)-new Date(a.date));

    const logoHtml = settings.logo

              <div class="invoice-subtitle">

                <th style="background:#f8fafc;padding:12px;border-bottom:1px solid #e2e8f0;text-align:right">البيان</th>
                <th style="background:#f8fafc;padding:12px;border-bottom:1px solid #e2e8f0;text-align:right">مدين</th>

  async function renderCustomerStatementCanvas(customerId) {
    const root = document.getElementById("capture-root");
    root.innerHTML = buildCustomerStatementHTML(customerId);
    const element = root.firstElementChild;
    const canvas = await html2canvas(element, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true,
      allowTaint: false
    });
    return { root, canvas };
  }

  async function printCustomerStatement(customerId) {
    const customer = getCustomerById(customerId);
    if (!customer) return;
    await safePrintFromCanvas(() => renderCustomerStatementCanvas(customerId));
  }

  async function downloadCustomerPDF(customerId) {
    const customer = getCustomerById(customerId);
    if (!customer) return;

    const { root, canvas } = await renderCustomerStatementCanvas(customerId);
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageHeight = 297;
    const imgWidth = 190;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 10;

    pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
    heightLeft -= (pageHeight - 20);

    while (heightLeft > 0) {
      position = heightLeft - imgHeight + 10;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - 20);
    }

    pdf.save(`customer_${customer.name || customer.id}.pdf`);
    root.innerHTML = "";
    showToast("تم حفظ كشف العميل PDF", "success");
  }

  async function downloadCustomerImage(customerId) {
    const customer = getCustomerById(customerId);
    if (!customer) return;

    const { root, canvas } = await renderCustomerStatementCanvas(customerId);
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = `customer_${customer.name || customer.id}.png`;
    link.click();
    root.innerHTML = "";
    showToast("تم حفظ كشف العميل كصورة", "success");
  }

  function downloadCustomerExcel(customerId) {
    const customer = getCustomerById(customerId);
    if (!customer) return;

    const invoices = (state.data.invoices || []).filter(i => i.customerId === customer.id).sort((a,b)=> new Date(b.date)-new Date(a.date));
    const payments = (customer.payments || []).slice().sort((a,b)=> new Date(b.date)-new Date(a.date));
    const manualDebts = (customer.manualDebts || []).slice().sort((a,b)=> new Date(b.date)-new Date(a.date));

    const rows = [
      ["اسم الشركة", state.data.settings.shopName || state.data.settings.companyName || ""],
      ["اسم العميل", customer.name || ""],
      ["الجوال", customer.phone || ""],
      ["العنوان", customer.address || ""],
      ["الرصيد الحالي", Number(customer.balance || 0)],
      [],
      ["النوع", "التاريخ", "البيان", "مدين", "دائن", "الديون"]
    ];

    invoices.forEach(inv => {
      const t = calculateInvoiceTotals(inv);
      rows.push(["فاتورة", formatDate(inv.date), inv.invoiceNumber || "", t.total, t.paid, t.remaining]);
    });

    manualDebts.forEach(d => {
      rows.push(["دين مباشر", formatDate(d.date), d.note || "", Number(d.amount || 0), 0, Number(d.amount || 0)]);
    });

    payments.forEach(p => {
      rows.push(["دفعة", formatDate(p.date), p.note || "", 0, Number(p.amount || 0), 0]);
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "كشف عميل");

    showToast("تم حفظ كشف العميل Excel", "success");
  }

    showToast("تم حفظ كشف العميل Word", "success");

  function openCustomerExportOptions(customerId) {

    openModal({
      title: `تصدير بيانات العميل ${customer.name}`,

  function openSendMessageModal(customerId) {
    const customer = getCustomerById(customerId);
    if (!customer) return;

    const balance = Number(customer.balance || 0);
    const defaultText = `تحية من ${state.data.settings.shopName || state.data.settings.companyName}
العميل: ${customer.name}
رصيدك الحالي: ${balance} ${state.data.settings.currency}
شكراً لتعاملكم معنا`;

    openModal({
      title: `إرسال للعميل ${escapeHtml(customer.name)}`,
      maxWidth: "620px",
      body: `
        <div class="space-y-4">
          <div class="grid sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">طريقة الإرسال</label>
              <select id="send-message-type" class="select">
                <option value="whatsapp">واتساب</option>
                <option value="sms">رسائل SMS</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">مقدمة الرقم</label>
              <select id="send-message-prefix" class="select">
                <option value="972">972</option>
                <option value="970">970</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">نص الرسالة</label>
            <textarea id="send-message-text" class="textarea">${escapeHtml(defaultText)}</textarea>
          </div>
        </div>
      `,
      footer: `
        <div class="flex gap-3">
          <button onclick="closeModal()" class="btn flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-bold">إلغاء</button>
          <button onclick="submitCustomerMessage('${customerId}')" class="btn flex-1 py-3 rounded-2xl bg-green-600 hover:bg-green-700 text-white font-extrabold">إرسال</button>
        </div>
      `
    });
  }

  function submitCustomerMessage(customerId) {
    const customer = getCustomerById(customerId);
    if (!customer || !customer.phone) {
      showToast("رقم العميل غير متوفر", "error");
      return;
    }

    const type = document.getElementById("send-message-type")?.value || "whatsapp";
    const prefix = document.getElementById("send-message-prefix")?.value || "972";
    const text = document.getElementById("send-message-text")?.value?.trim() || "";

    let phone = customer.phone.replace(/[^\d]/g, "");
    phone = phone.replace(/^0+/, "");
    phone = `${prefix}${phone}`;

    closeModal();

    if (type === "sms") {
      const smsUrl = `sms:${phone}?body=${encodeURIComponent(text)}`;
      window.location.href = smsUrl;
      return;
    }

    const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
    window.open(waUrl, "_blank");
  }

  function sendWhatsApp(customerId) {
    openSendMessageModal(customerId);
  }
</script>

<script>
  function getNextInvoiceNumber() {
    const prefix = state.data.settings.invoicePrefix || "INV";
    const count = (state.data.invoices || []).length + 1;
    return `${prefix}-${String(count).padStart(4, "0")}`;
  }

  function showCustomerSuggestionsInInvoice(query) {
    const box = document.getElementById("invoice-customer-suggestions");
    if (!box) return;
    const results = getCustomerSuggestions(query);
    if (!results.length) {
      box.innerHTML = "";
      box.classList.add("hidden-force");
      return;
    }

    box.classList.remove("hidden-force");
    box.innerHTML = results.map(c => `
      <button type="button" class="suggestion-item" onclick="selectInvoiceCustomerSuggestion('${c.id}')">
        ${escapeHtml(c.name)}${c.phone ? ` - ${escapeHtml(c.phone)}` : ""}
      </button>
    `).join("");
  }

  function selectInvoiceCustomerSuggestion(customerId) {
    const customer = getCustomerById(customerId);
    if (!customer) return;
    const nameInput = document.getElementById("invoice-customer-name");
    const phoneInput = document.getElementById("invoice-customer-phone");
    const hiddenId = document.getElementById("invoice-customer-id");
    const box = document.getElementById("invoice-customer-suggestions");

    if (nameInput) nameInput.value = customer.name || "";
    if (phoneInput) phoneInput.value = customer.phone || "";
    if (hiddenId) hiddenId.value = customer.id || "";
    if (box) {
      box.innerHTML = "";
      box.classList.add("hidden-force");
    }
  }

  function addInvoiceItemRow(data = {}) {
    const wrap = document.getElementById("invoice-items-wrap");
    if (!wrap) return;
    const row = document.createElement("div");
    row.className = "grid grid-cols-12 gap-2 items-center";
    row.innerHTML = `
      <div class="col-span-5">
        <input type="text" class="input invoice-item-name" placeholder="اسم الصنف" value="${escapeHtml(data.name || "")}">
      </div>
      <div class="col-span-2">
        <input type="number" class="input invoice-item-qty" placeholder="الكمية" value="${data.qty ?? ""}" min="1" oninput="recalcInvoiceDraft()">
      </div>
      <div class="col-span-3">
        <input type="number" class="input invoice-item-price" placeholder="السعر" value="${data.price ?? ""}" min="0" step="0.01" oninput="recalcInvoiceDraft()">
      </div>
      <div class="col-span-2">
        <button type="button" class="w-full min-h-[52px] rounded-2xl bg-red-50 hover:bg-red-100 text-red-700 font-bold" onclick="this.closest('.grid').remove(); recalcInvoiceDraft();">حذف</button>
      </div>
    `;
    wrap.appendChild(row);
    recalcInvoiceDraft();
  }

  function recalcInvoiceDraft() {
    const rows = Array.from(document.querySelectorAll("#invoice-items-wrap > .grid"));
    let subtotal = 0;
    rows.forEach(row => {
      const qty = parseNumber(row.querySelector(".invoice-item-qty")?.value);
      const price = parseNumber(row.querySelector(".invoice-item-price")?.value);
      subtotal += qty * price;
    });

    const discount = parseNumber(document.getElementById("invoice-discount")?.value);
    const paid = parseNumber(document.getElementById("invoice-paid")?.value);
    const total = Math.max(0, subtotal - discount);
    const remaining = Math.max(0, total - paid);

    const subEl = document.getElementById("invoice-subtotal-preview");
    const totalEl = document.getElementById("invoice-total-preview");
    const remainingEl = document.getElementById("invoice-remaining-preview");

    if (subEl) subEl.textContent = formatCurrency(subtotal);
    if (totalEl) totalEl.textContent = formatCurrency(total);
    if (remainingEl) remainingEl.textContent = formatCurrency(remaining);
  }

  function showInvoiceModal(customerId = "") {
    const customer = customerId ? getCustomerById(customerId) : null;

    openModal({
      title: "فاتورة جديدة",
      maxWidth: "980px",
      body: `
        <div class="space-y-4">
          <input id="invoice-customer-id" type="hidden" value="${customer?.id || ""}">
          <div class="grid sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">اسم العميل</label>
              <input id="invoice-customer-name" type="text" class="input" value="${escapeHtml(customer?.name || "")}" oninput="showCustomerSuggestionsInInvoice(this.value)">
              <div id="invoice-customer-suggestions" class="suggestions-box hidden-force"></div>
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">رقم الهاتف</label>
              <input id="invoice-customer-phone" type="text" class="input" value="${escapeHtml(customer?.phone || "")}">
            </div>
          </div>

          <div class="grid sm:grid-cols-3 gap-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">رقم الفاتورة</label>
              <input id="invoice-number" type="text" class="input" value="${escapeHtml(getNextInvoiceNumber())}">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">التاريخ</label>
              <input id="invoice-date" type="datetime-local" class="input" value="${todayISO()}">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">الحالة</label>
              <select id="invoice-status" class="select">
                <option value="pending">غير مكتملة</option>
                <option value="review">قيد المراجعة</option>
                <option value="completed">مكتملة</option>
              </select>
              <div class="text-xs text-slate-500 mt-2">غير مكتملة: لم تُنجز بعد، قيد المراجعة: بانتظار اعتماد، مكتملة: انتهت واعتمدت.</div>
            </div>
          </div>

          <div class="bg-slate-50 border border-slate-200 rounded-[24px] p-4">
            <div class="flex items-center justify-between mb-3">
