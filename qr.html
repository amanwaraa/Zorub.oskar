<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>كاميرا قارئ الباركود</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: #020617;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .camera-page {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #reader {
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #reader video {
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
    }

    #reader__scan_region,
    #reader__dashboard {
      display: none !important;
    }

    .scan-frame {
      pointer-events: none;
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(82vw, 420px);
      height: 230px;
      transform: translate(-50%, -50%);
      border: 3px solid rgba(255,255,255,.55);
      border-radius: 26px;
      z-index: 10;
      transition: .15s ease;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,.18),
        0 0 30px rgba(255,255,255,.15);
    }

    .scan-frame::before,
    .scan-frame::after {
      content: "";
      position: absolute;
      width: 54px;
      height: 54px;
      border-color: #22c55e;
      border-style: solid;
      filter: drop-shadow(0 0 12px rgba(34,197,94,.95));
    }

    .scan-frame::before {
      top: -4px;
      right: -4px;
      border-width: 6px 6px 0 0;
      border-radius: 0 22px 0 0;
    }

    .scan-frame::after {
      left: -4px;
      bottom: -4px;
      border-width: 0 0 6px 6px;
      border-radius: 0 0 0 22px;
    }

    .laser {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(72vw, 360px);
      height: 3px;
      transform: translate(-50%, -50%);
      z-index: 11;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
      box-shadow: 0 0 22px #22c55e;
      animation: laserMove 1.2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes laserMove {
      0%, 100% {
        transform: translate(-50%, calc(-50% - 95px));
        opacity: .55;
      }

      50% {
        transform: translate(-50%, calc(-50% + 95px));
        opacity: 1;
      }
    }

    .detected .scan-frame {
      border-color: #22c55e;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,.13),
        0 0 40px rgba(34,197,94,.9),
        inset 0 0 35px rgba(34,197,94,.25);
      animation: greenPop .28s ease;
    }

    @keyframes greenPop {
      0% { transform: translate(-50%, -50%) scale(.96); }
      60% { transform: translate(-50%, -50%) scale(1.03); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .toast {
      position: fixed;
      right: 16px;
      left: 16px;
      bottom: 28px;
      z-index: 50;
      padding: 15px 18px;
      border-radius: 18px;
      background: rgba(15, 23, 42, .96);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0,0,0,.4);
      border: 1px solid rgba(255,255,255,.15);
      transform: translateY(130%);
      opacity: 0;
      transition: .25s ease;
      direction: ltr;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>

<body>
  <div id="cameraPage" class="camera-page">
    <div id="reader"></div>
    <div class="scan-frame"></div>
    <div class="laser"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    let scanner = null;
    let isRunning = false;
    let lastCode = "";
    let lastTime = 0;

    const cameraPage = document.getElementById("cameraPage");
    const toastBox = document.getElementById("toast");

    const scanSound = new Audio("./qr.mp3");
    scanSound.preload = "auto";
    scanSound.volume = 1;

    function unlockSound() {
      scanSound.play()
        .then(() => {
          scanSound.pause();
          scanSound.currentTime = 0;
        })
        .catch(() => {});
    }

    document.addEventListener("click", unlockSound, { once: true });
    document.addEventListener("touchstart", unlockSound, { once: true });

    function showToast(code) {
      toastBox.textContent = code;
      toastBox.classList.add("show");

      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        toastBox.classList.remove("show");
      }, 1800);
    }

    function playBeep() {
      try {
        scanSound.pause();
        scanSound.currentTime = 0;
        scanSound.play().catch(() => {});
      } catch (e) {
        console.warn(e);
      }
    }

    function vibratePhone() {
      if (navigator.vibrate) {
        navigator.vibrate([55, 25, 55]);
      }
    }

    function markDetected() {
      cameraPage.classList.add("detected");

      clearTimeout(window.__detectedTimer);
      window.__detectedTimer = setTimeout(() => {
        cameraPage.classList.remove("detected");
      }, 550);
    }

    function onScanSuccess(decodedText, decodedResult) {
      const now = Date.now();

      if (decodedText === lastCode && now - lastTime < 1400) return;

      lastCode = decodedText;
      lastTime = now;

      markDetected();
      playBeep();
      vibratePhone();
      showToast(decodedText);

      window.dispatchEvent(new CustomEvent("barcode:scanned", {
        detail: {
          code: decodedText,
          result: decodedResult
        }
      }));
    }

    function onScanFailure(error) {}

    async function startCameraScanner() {
      if (isRunning) return;

      try {
        scanner = new Html5Qrcode("reader", {
          formatsToSupport: [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODE_93,
            Html5QrcodeSupportedFormats.ITF,
            Html5QrcodeSupportedFormats.CODABAR,
            Html5QrcodeSupportedFormats.DATA_MATRIX,
            Html5QrcodeSupportedFormats.AZTEC,
            Html5QrcodeSupportedFormats.PDF_417
          ],
          verbose: false
        });

        const config = {
          fps: 30,
          qrbox: function(viewfinderWidth, viewfinderHeight) {
            return {
              width: Math.floor(viewfinderWidth * 0.82),
              height: Math.floor(viewfinderHeight * 0.34)
            };
          },
          aspectRatio: 1.7777778,
          disableFlip: false,
          experimentalFeatures: {
            useBarCodeDetectorIfSupported: true
          },
          videoConstraints: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            advanced: [
              { focusMode: "continuous" },
              { exposureMode: "continuous" },
              { whiteBalanceMode: "continuous" }
            ]
          }
        };

        await scanner.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        );

        isRunning = true;
      } catch (err) {
        console.error(err);
        showToast("اسمح باستخدام الكاميرا");
      }
    }

    window.addEventListener("load", () => {
      setTimeout(startCameraScanner, 300);
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.hidden && scanner && isRunning) {
        try {
          await scanner.stop();
          await scanner.clear();
        } catch (e) {}

        isRunning = false;
      }

      if (!document.hidden && !isRunning) {
        setTimeout(startCameraScanner, 300);
      }
    });

    window.addEventListener("beforeunload", () => {
      if (scanner && isRunning) {
        scanner.stop().catch(() => {});
      }
    });
  </script>
</body>
</html>
